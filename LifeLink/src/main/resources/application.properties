spring.application.name=LifeLink
spring.datasource.url=jdbc:mysql://localhost:3306/lifelink?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Yangon&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=admin
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#front-end
app.frontend.url=http://localhost:5173

server.servlet.context-path=/api

#Debug
logging.level.org.springframework.security=TRACE
server.error.include-message=always
server.error.include-stacktrace=always

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false

# Reuse the resolved Spring mail username
lifelink.mail.from=${spring.mail.username}
lifelink.mail.test-recipient=${MAIL_TEST_RECIPIENT:}

spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.checkserveridentity=true